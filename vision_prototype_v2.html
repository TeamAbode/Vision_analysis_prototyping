function Panel({ title, subtitle, iconKey, children, style = {}, accent }) {
  return (
    <div style={{ background: 'white', border: `1px solid ${C.border}`, borderTop: accent ? `3px solid ${accent}` : `1px solid ${C.border}`, borderRadius: 10, padding: 18, ...style }}>

          {subtitle && <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, color: C.subtle, marginTop: 1 }}>{subtitle}</div>}
        </div>
      </div>
      {children}
    </div>
  );
}

function Insight({ children, tone = 'neutral' }) {
  const colors = {
    neutral: { bg: C.light, border: C.primary, text: C.text },

      {children}
    </div>
  );
}

function Stat({ value, label, sublabel, color }) {
  return (
    <div>
      <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 22, color: color || C.primary, lineHeight: 1 }}>{value}</div>

    </div>

}

function TimelineViz({ data, segments, duration, label, color = C.primary, height = 50, yMin, yMax }) {
  const min = yMin !== undefined ? yMin : Math.min(...data);
  const max = yMax !== undefined ? yMax : Math.max(...data);
  const range = max - min || 1;
  const gradId = `tf-${label.replace(/\s/g, '')}-${Math.random().toString(36).substr(2, 5)}`;
  return (
    <div>
      {label && <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginBottom: 6 }}>{label}</div>}
      <div style={{ position: 'relative', height }}>
        <svg width="100%" height={height} viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {segments.map((seg, i) => {
            const x1 = (seg.start / duration) * 100;
            const x2 = (seg.end / duration) * 100;
            return <rect key={seg.id} x={x1} y="0" width={x2 - x1} height="100" fill={i % 2 === 0 ? 'transparent' : 'rgba(0,0,0,0.015)'} />;
          })}
          <polygon points={`0,100 ${data.map((v, i) => `${(i / (data.length - 1)) * 100},${100 - ((v - min) / range) * 100}`).join(' ')} 100,100`} fill={`url(#${gradId})`} />
          <polyline points={data.map((v, i) => `${(i / (data.length - 1)) * 100},${100 - ((v - min) / range) * 100}`).join(' ')} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
        </svg>
      </div>
      <div style={{ display: 'flex', marginTop: 4, fontFamily: 'Poppins, sans-serif', fontSize: 9, color: C.subtle }}>
        {segments.map(seg => {
          const w = ((seg.end - seg.start) / duration) * 100;
          return <div key={seg.id} style={{ width: `${w}%`, textAlign: 'center', overflow: 'hidden', whiteSpace: 'nowrap' }}>{seg.label.split(' ')[0]}</div>;
        })}
      </div>
    </div>
  );
}

function RingMeter({ value, max = 10, label, size = 76, color = C.primary }) {
  const r = size / 2 - 6;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - value / max);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.light} strokeWidth="5" />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size / 2} ${size / 2})`} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 18, color: C.text, lineHeight: 1 }}>{value}</div>
        {label && <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 8, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginTop: 2, textAlign: 'center', maxWidth: 60 }}>{label}</div>}
      </div>
    </div>
  );
}

function Bar({ value, max = 10, color = C.primary, height = 5, label, labelRight }) {
  return (
    <div>
      {(label || labelRight) && (
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3, fontFamily: 'Poppins, sans-serif', fontSize: 10.5, fontWeight: 500, color: C.text }}>
          <span>{label}</span>
          <span style={{ color: C.subtle }}>{labelRight}</span>
        </div>
      )}
      <div style={{ height, background: C.gray, borderRadius: height / 2, overflow: 'hidden' }}>
        <div style={{ width: `${Math.min(100, (value / max) * 100)}%`, height: '100%', background: color, borderRadius: height / 2 }} />
      </div>
    </div>
  );
}

// NEW TAB: TACTICAL CHECKLIST
// ============================================================================
function ChecklistTab() {
  const [activeCaseType, setActiveCaseType] = useState(CASE.caseTypeKey);
  const checklist = CHECKLISTS[activeCaseType];
  const total = checklist.sections.reduce((sum, s) => sum + s.items.length, 0);
  const done = checklist.sections.reduce((sum, s) => sum + s.items.filter(i => i.done === true).length, 0);
  const partial = checklist.sections.reduce((sum, s) => sum + s.items.filter(i => i.done === 'partial').length, 0);
  const failed = checklist.sections.reduce((sum, s) => sum + s.items.filter(i => i.done === false).length, 0);
  const naCount = checklist.sections.reduce((sum, s) => sum + s.items.filter(i => i.done === 'na').length, 0);
  const applicable = total - naCount;

  const caseTypes = [
    { key: 'wrongful_death', label: 'Wrongful Death' },
    { key: 'premises_liability', label: 'Premises Liability' },
    { key: 'medical_malpractice', label: 'Medical Malpractice' },
    { key: 'products_liability', label: 'Products Liability' },
  ];

  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)', gap: 14 }}>
      <div style={{ gridColumn: 'span 12' }}>
        <Panel title="Tactical closing checklist" subtitle="Case-type-specific elements every closing should hit" iconKey="ClipboardCheck">
          <Insight tone="info">
            Each case type has a specific set of legal elements, defense patterns, and risk-avoidance items the closing must address. The checklist auto-populates from your case type and surfaces gaps before trial. Sources include trial advocacy literature, pattern jury charges, and case-type-specific defense playbooks.
          </Insight>
          {/* Case type selector */}
          <div style={{ display: 'flex', gap: 6, marginTop: 14, flexWrap: 'wrap' }}>
            {caseTypes.map(ct => (
              <button key={ct.key} onClick={() => setActiveCaseType(ct.key)} style={{
                padding: '8px 14px', background: activeCaseType === ct.key ? C.primary : 'white',
                color: activeCaseType === ct.key ? 'white' : C.subtle,
                border: `1px solid ${activeCaseType === ct.key ? C.primary : C.border}`,
                borderRadius: 6, cursor: 'pointer', fontFamily: 'Poppins, sans-serif',
                fontWeight: 600, fontSize: 12,
              }}>
                {ct.label}
                {ct.key === CASE.caseTypeKey && <span style={{ marginLeft: 6, fontSize: 9, opacity: 0.8, fontWeight: 500 }}>· current case</span>}
              </button>
            ))}
          </div>
        </Panel>
      </div>

      {/* Summary card */}
      <div style={{ gridColumn: 'span 12' }}>
        <Panel title={checklist.label} subtitle={`Pattern instruction: ${checklist.instruction}`} iconKey="Scale" accent={C.primary}>
          {applicable > 0 ? (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', gap: 14, alignItems: 'center', marginBottom: 14 }}>
                <div>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Completion</div>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8 }}>
                    <span style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, color: C.primary }}>{done}</span>
                    <span style={{ fontFamily: 'Poppins, sans-serif', fontSize: 14, color: C.subtle }}>/ {applicable} complete</span>
                  </div>
                  <div style={{ height: 8, background: C.gray, borderRadius: 4, overflow: 'hidden', display: 'flex' }}>
                    <div style={{ width: `${(done / applicable) * 100}%`, height: '100%', background: C.good }} />
                    <div style={{ width: `${(partial / applicable) * 100}%`, height: '100%', background: C.warn }} />
                    <div style={{ width: `${(failed / applicable) * 100}%`, height: '100%', background: C.bad }} />
                  </div>
                </div>
                <Stat value={done} label="Done" color={C.good} />
                <Stat value={partial} label="Partial" color={C.warn} />
                <Stat value={failed} label="Missing" color={C.bad} />
              </div>
              {failed > 0 && <Insight tone="bad"><strong>{failed} items not yet addressed.</strong> Focus areas appear below — they\'re the gap between current closing and a complete one.</Insight>}
            </>
          ) : (
            <Insight tone="info">{checklist.note}</Insight>
          )}
        </Panel>
      </div>

      {/* Sections */}
      {checklist.sections.map((section, si) => (
        <div key={si} style={{ gridColumn: 'span 12' }}>
          <Panel title={section.title} iconKey="ClipboardCheck">
            {section.items.map((item, i) => {
              let bg, borderColor, statusIcon, statusColor;
              if (item.done === true) { bg = C.goodBg; borderColor = C.good; statusIcon = 'CheckCircle'; statusColor = C.good; }
              else if (item.done === 'partial') { bg = C.warnBg; borderColor = C.warn; statusIcon = 'AlertTriangle'; statusColor = C.warn; }
              else if (item.done === false) { bg = C.badBg; borderColor = C.bad; statusIcon = 'XCircle'; statusColor = C.bad; }
              else { bg = C.gray; borderColor = C.border; statusIcon = 'Info'; statusColor = C.subtle; }
              return (
                <div key={item.id} style={{ display: 'flex', gap: 12, padding: 12, borderLeft: `3px solid ${borderColor}`, background: bg, borderRadius: 4, marginBottom: 6 }}>
                  <div style={{ width: 22, height: 22, color: statusColor, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icon path={icons[statusIcon]} size={18} color={statusColor} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 13, color: C.text, fontWeight: 500, lineHeight: 1.45 }}>{item.label}</div>
                    {item.detail && <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.subtle, marginTop: 4, lineHeight: 1.5 }}>{item.detail}</div>}
                    {item.source && <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, color: C.subtle, fontStyle: 'italic', marginTop: 4 }}>Source: {item.source}</div>}
                  </div>
                </div>
              );
            })}
          </Panel>
        </div>
      ))}
    </div>
  );
}

      {/* Top nav */}
      <div style={{ background: 'white', borderBottom: `1px solid ${C.border}`, padding: '12px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 50 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <svg width="30" height="30" viewBox="0 0 100 100"><polygon points="25,5 75,5 100,50 75,95 25,95 0,50" fill={C.primary} /><text x="50" y="62" textAnchor="middle" fill="white" fontFamily="Poppins, sans-serif" fontWeight="800" fontSize="34">JA</text></svg>
          <div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 13, color: C.primary, letterSpacing: '0.02em' }}>JURY ANALYST</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 9, color: C.subtle, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Closing Analysis</div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 12, color: C.text }}>{CASE.name}</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 10, color: C.subtle }}>{CASE.type} · {CASE.jurisdiction}</div>
          </div>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: C.secondary, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 12 }}>RC</div>
        </div>
      </div>

      {/* Hero */}
      <div style={{ background: `linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 100%)`, padding: '22px 24px', color: 'white', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', right: -40, top: -60, opacity: 0.06 }}>
          <svg width="280" height="280" viewBox="0 0 100 100"><polygon points="25,5 75,5 100,50 75,95 25,95 0,50" fill="white" /></svg>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr 1fr 1fr 1fr', gap: 24, alignItems: 'center', position: 'relative' }}>
          <div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 6 }}>The Headline</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 19, fontWeight: 700, lineHeight: 1.3 }}>Strong rule, right emotions, missing checklist items.</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 12.5, opacity: 0.85, marginTop: 6, lineHeight: 1.55 }}>Your primary safety rule scores 8.25/10 across the four attributes. Empathy and indignation hit the right beats. But 5 wrongful-death checklist items are missing or partial — including 2 high-risk objection moments.</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Rule Score</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>8.25<span style={{ fontSize: 14, opacity: 0.6 }}>/10</span></div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>composite (4 attrs)</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Primary Emotion</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 22, lineHeight: 1.1 }}>Empathy</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>60-75% intensity</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Checklist</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>13<span style={{ fontSize: 14, opacity: 0.6 }}>/21</span></div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>5 missing</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Objection Risk</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>2</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>high-risk moments</div>
          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ background: 'white', borderBottom: `1px solid ${C.border}`, padding: '0 24px', display: 'flex', gap: 2, overflowX: 'auto', position: 'sticky', top: 62, zIndex: 40 }}>
        {views.map(v => {
          const active = activeView === v.id;
          return (
            <button key={v.id} onClick={() => setActiveView(v.id)} style={{ padding: '12px 14px', background: 'transparent', border: 'none', borderBottom: active ? `3px solid ${C.primary}` : '3px solid transparent', marginBottom: -1, cursor: 'pointer', fontFamily: 'Poppins, sans-serif', fontWeight: active ? 600 : 500, fontSize: 12, color: active ? C.primary : C.subtle, whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 7 }}>
              <Icon path={icons[v.iconKey]} size={13} />
              {v.label}
            </button>
          );
        })}
      </div>

      {/* Content + sidebar */}
      <div style={{ padding: 20, display: 'grid', gridTemplateColumns: '1fr 340px', gap: 16 }}>
        <div>
          <TabContent active={activeView} />
        </div>

        {/* Right column */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ background: 'white', border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', position: 'sticky', top: 116 }}>
            <div style={{ aspectRatio: '16/9', background: `linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 100%)`, position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 60%)' }} />
              <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', zIndex: 1 }} onClick={() => setIsPlaying(!isPlaying)}>
                <Icon path={isPlaying ? icons.Pause : icons.Play} size={26} color="white" />
              </div>
              <div style={{ position: 'absolute', bottom: 10, left: 12, color: 'white', fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.75 }}>Mock Closing · {fmt(CASE.duration)}</div>
            </div>
            <div style={{ padding: 10, background: C.dark }}>
              <div style={{ display: 'flex', height: 5, borderRadius: 3, overflow: 'hidden', marginBottom: 8 }}>
                {SEGMENTS.map(seg => {
                  const width = ((seg.end - seg.start) / CASE.duration) * 100;
                  const isActive = currentTime >= seg.start && currentTime < seg.end;
                  return <div key={seg.id} onClick={() => setCurrentTime(seg.start)} style={{ width: `${width}%`, background: seg.color, opacity: isActive ? 1 : 0.5, cursor: 'pointer' }} title={seg.label} />;
                })}
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'Poppins, sans-serif', fontSize: 10, color: 'white' }}>
                <span>{fmt(currentTime)}</span>
                <span style={{ opacity: 0.5 }}>{fmt(CASE.duration)}</span>
              </div>
            </div>
            <div style={{ padding: 14 }}>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Current Segment</div>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 15, color: C.text }}>
                {SEGMENTS.find(s => currentTime >= s.start && currentTime < s.end)?.label || 'Opening Hook'}
              </div>
            </div>
          </div>

          <Panel title="Top 3 fixes" subtitle="Ranked by expected lift" iconKey="Lightbulb">
            {[
              { num: 1, title: 'Rewrite Golden Rule at 11:22', effort: 'Low', impact: 'High' },
              { num: 2, title: 'Strengthen rule\'s evidence connection in rebuttal', effort: 'Med', impact: 'High' },
              { num: 3, title: 'Add per-diem for $8.4M non-economic', effort: 'Med', impact: 'Med' },
            ].map((fix, i) => (
              <div key={i} style={{ padding: '10px 0', borderBottom: i < 2 ? `1px solid ${C.border}` : 'none', display: 'flex', gap: 10 }}>
                <div style={{ width: 22, height: 22, borderRadius: '50%', background: C.primary, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 11, flexShrink: 0 }}>{fix.num}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 12.5, color: C.text, lineHeight: 1.35 }}>{fix.title}</div>
                  <div style={{ display: 'flex', gap: 10, marginTop: 4, fontFamily: 'Poppins, sans-serif', fontSize: 10, color: C.subtle }}>
                    <span>Effort: <strong style={{ color: C.text }}>{fix.effort}</strong></span>
                    <span>Impact: <strong style={{ color: fix.impact === 'High' ? C.good : C.warn }}>{fix.impact}</strong></span>
                  </div>
                </div>
              </div>
            ))}
          </Panel>

          <Panel title="Case context" iconKey="FileText">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, fontFamily: 'Noto Sans, sans-serif', fontSize: 12 }}>
              <div><span style={{ color: C.subtle }}>Attorney: </span><strong>{CASE.attorney}</strong></div>
              <div><span style={{ color: C.subtle }}>Jurisdiction: </span><strong>{CASE.jurisdiction}</strong></div>
              <div><span style={{ color: C.subtle }}>Case type: </span><strong>{CHECKLISTS[CASE.caseTypeKey].label}</strong></div>
              <div><span style={{ color: C.subtle }}>Pattern instruction: </span><strong>{CHECKLISTS[CASE.caseTypeKey].instruction}</strong></div>
              <div><span style={{ color: C.subtle }}>Words: </span><strong>{CASE.wordCount.toLocaleString()}</strong></div>
              <div><span style={{ color: C.subtle }}>Exhibits referenced: </span><strong>14</strong></div>
            </div>
          </Panel>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>
</body>
</html>
